# nixpacks.toml — Railway build configuration
# Installs Node.js alongside Python so the React frontend can be built
# before Django collectstatic runs.

providers = ["python"]

[phases.setup]
nixPkgs = ["nodejs_20"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm ci"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "python manage.py collectstatic --noinput",
    "python manage.py migrate --noinput"
]
[start]
cmd = "daphne -b 0.0.0.0 -p $PORT sirenapp.asgi:application"
