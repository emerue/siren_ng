# nixpacks.toml — Railway build configuration
# Installs Node.js alongside Python so the React frontend can be built
# before Django collectstatic runs.

providers = ["python"]

[phases.setup]
nixPkgs = ["nodejs_20", "npm-9_x"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "cd frontend && npm ci"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "python manage.py collectstatic --noinput"
]
# No [start] here — Railway uses the Procfile web process
