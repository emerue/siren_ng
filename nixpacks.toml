# nixpacks.toml
providers = ["python"]

[phases.setup]
nixPkgs = ["python313", "python313Packages.pip", "nodejs_20", "postgresql"]

[phases.install]
cmds = [
    "python3 -m pip install --upgrade pip",
    "python3 -m pip install -r requirements.txt",
    "cd frontend && npm ci"
]

[phases.build]
cmds = [
    "cd frontend && npm run build",
    "python3 manage.py collectstatic --noinput",
    "python3 manage.py migrate --noinput"
]

[start]
cmd = "daphne -b 0.0.0.0 -p $PORT sirenapp.asgi:application"
